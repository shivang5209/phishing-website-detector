<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Phishing Detector{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #f7f9fb;
      --surface-low: #f2f4f6;
      --surface: #ffffff;
      --surface-high: #e6e8ea;
      --surface-highest: #e0e3e5;
      --ink: #191c1e;
      --ink-strong: #131b2e;
      --muted: #45464d;
      --quiet: #76777d;
      --primary: #000000;
      --primary-container: #131b2e;
      --primary-soft: #dae2fd;
      --success: #007a55;
      --success-soft: #dff9eb;
      --warning: #855300;
      --warning-soft: #ffddb8;
      --danger: #93000a;
      --danger-soft: #ffdad6;
      --ghost: rgba(118, 119, 125, 0.15);
      --shadow: 0 32px 64px -4px rgba(25, 28, 30, 0.06);
      --ambient: 0 18px 44px rgba(19, 27, 46, 0.07);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(218, 226, 253, 0.72), transparent 28%),
        radial-gradient(circle at 92% 16%, rgba(255, 221, 184, 0.52), transparent 26%),
        linear-gradient(180deg, var(--background), #eef2f6 100%);
    }

    a { color: inherit; }

    .font-headline,
    h1,
    h2,
    h3 {
      font-family: "Space Grotesk", sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 450, "GRAD" 0, "opsz" 24;
      line-height: 1;
      vertical-align: middle;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      padding: 22px clamp(18px, 4vw, 48px);
      background: rgba(242, 244, 246, 0.86);
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 64px -4px rgba(25, 28, 30, 0.04);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--ink-strong);
      white-space: nowrap;
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      border-radius: 11px;
      box-shadow: var(--ambient);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(14px, 2vw, 34px);
      color: var(--quiet);
      font-weight: 700;
    }

    .nav-links a {
      position: relative;
      text-decoration: none;
      transition: color 180ms ease;
      white-space: nowrap;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--ink-strong);
    }

    .nav-links a.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -7px;
      height: 2px;
      background: var(--ink-strong);
      border-radius: 999px;
    }

    .nav-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(218, 226, 253, 0.55);
      color: var(--ink-strong);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .pulse {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(0, 122, 85, 0.12);
    }

    .page {
      width: min(1360px, calc(100% - 36px));
      margin: 0 auto;
      padding: 52px 0 80px;
    }

    .page-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 28px;
      align-items: end;
      margin-bottom: 36px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin: 0 0 14px;
      color: var(--ink-strong);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 880px;
      color: var(--ink-strong);
      font-size: clamp(2.65rem, 7vw, 5.35rem);
      line-height: 0.92;
      letter-spacing: -0.07em;
    }

    h2 {
      margin: 0 0 18px;
      color: var(--ink-strong);
      font-size: clamp(1.45rem, 3vw, 2.05rem);
      letter-spacing: -0.04em;
    }

    h3 {
      margin: 0 0 10px;
      color: var(--ink-strong);
      font-size: 1.18rem;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 18px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 1.03rem;
      line-height: 1.75;
    }

    .hero-action {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
    }

    .panel {
      background: var(--surface-low);
      border-radius: 28px;
      padding: clamp(18px, 3vw, 34px);
      box-shadow: var(--shadow);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--ghost);
      border-radius: var(--radius);
      padding: clamp(18px, 2.2vw, 28px);
      box-shadow: 0 16px 32px rgba(25, 28, 30, 0.025);
    }

    .card-muted {
      background: var(--surface-low);
      border-radius: var(--radius);
      padding: clamp(18px, 2.2vw, 28px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .layout-12 {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: clamp(18px, 2.8vw, 34px);
      align-items: start;
    }

    .span-8 { grid-column: span 8; }
    .span-7 { grid-column: span 7; }
    .span-5 { grid-column: span 5; }
    .span-4 { grid-column: span 4; }
    .span-12 { grid-column: span 12; }

    .label {
      margin-bottom: 9px;
      color: var(--quiet);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .value {
      margin: 0;
      color: var(--ink-strong);
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.45rem, 3vw, 2.7rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      word-break: break-word;
    }

    .value-sm {
      margin: 0;
      color: var(--ink-strong);
      font-weight: 800;
      word-break: break-word;
    }

    .muted {
      color: var(--muted);
      line-height: 1.65;
    }

    .mono,
    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      word-break: break-word;
    }

    .scan-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 9px;
      background: var(--surface);
      border-radius: 18px;
      box-shadow: var(--ambient);
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      min-width: 0;
      border: 2px solid transparent;
      border-radius: 13px;
      background: var(--surface-low);
      color: var(--ink);
      font: inherit;
      font-weight: 600;
      outline: none;
    }

    input[type="text"] {
      padding: 17px 18px;
      font-size: 1rem;
    }

    input[type="file"] {
      padding: 15px;
    }

    input:focus {
      border-color: rgba(19, 27, 46, 0.22);
      background: var(--surface);
    }

    .btn,
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 0;
      border-radius: 13px;
      padding: 15px 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.96rem;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
      white-space: nowrap;
    }

    .btn:hover,
    button:hover {
      transform: translateY(-1px);
      opacity: 0.94;
    }

    .btn.secondary,
    button.secondary {
      background: var(--surface-high);
      color: var(--ink-strong);
    }

    .btn.ghost {
      background: var(--surface);
      color: var(--ink-strong);
      box-shadow: 0 12px 26px rgba(25, 28, 30, 0.035);
    }

    .alert {
      margin: 18px 0;
      border-radius: 16px;
      padding: 15px 16px;
      font-weight: 700;
      line-height: 1.55;
    }

    .alert.error {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .alert.warning {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 8px 12px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge.good,
    .verdict.good {
      background: var(--success-soft);
      color: var(--success);
    }

    .badge.bad,
    .verdict.bad {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.warn {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .verdict {
      display: inline-flex;
      border-radius: 999px;
      padding: 10px 14px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 800;
    }

    .score {
      margin: 0;
      color: var(--ink-strong);
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2.5rem, 5vw, 4.4rem);
      font-weight: 800;
      letter-spacing: -0.08em;
      line-height: 0.95;
    }

    .stream {
      display: flex;
      flex-direction: column;
    }

    .stream-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--ghost);
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(25, 28, 30, 0.025);
      transition: transform 160ms ease;
    }

    .stream-item:not(:first-child) {
      margin-top: -4px;
    }

    .stream-item:hover {
      transform: translateX(5px);
    }

    .stream-main {
      min-width: 0;
    }

    .stream-title {
      margin: 0 0 5px;
      color: var(--ink-strong);
      font-weight: 800;
      word-break: break-word;
    }

    .stream-meta {
      margin: 0;
      color: var(--quiet);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 8px;
    }

    th {
      padding: 12px 14px;
      color: var(--quiet);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-align: left;
      text-transform: uppercase;
    }

    td {
      padding: 16px 14px;
      background: var(--surface-low);
      vertical-align: top;
    }

    td:first-child {
      border-radius: 13px 0 0 13px;
    }

    td:last-child {
      border-radius: 0 13px 13px 0;
    }

    ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.72;
    }

    li + li {
      margin-top: 7px;
    }

    .plots {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .plots img {
      width: 100%;
      display: block;
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 12px 26px rgba(25, 28, 30, 0.035);
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 28px clamp(18px, 4vw, 48px);
      background: rgba(255, 255, 255, 0.74);
      color: var(--quiet);
      font-size: 0.8rem;
    }

    @media (max-width: 980px) {
      .top-nav,
      .page-hero,
      .footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav-links {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 8px;
      }

      .hero-action {
        justify-content: flex-start;
      }

      .layout-12 {
        grid-template-columns: 1fr;
      }

      .span-8,
      .span-7,
      .span-5,
      .span-4,
      .span-12 {
        grid-column: auto;
      }
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 24px, 1360px);
        padding-top: 34px;
      }

      .scan-form {
        grid-template-columns: 1fr;
      }

      .btn,
      button {
        width: 100%;
      }

      .stream-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a class="brand" href="/">
      <span class="brand-mark"><span class="material-symbols-outlined">shield</span></span>
      PhishGuard
    </a>
    <div class="nav-links">
      <a class="{{ 'active' if active_page == 'dashboard' else '' }}" href="/">Dashboard</a>
      <a class="{{ 'active' if active_page == 'batch' else '' }}" href="/batch-analysis">Batch Analysis</a>
      <a class="{{ 'active' if active_page == 'training' else '' }}" href="/training-report">Training Report</a>
      <a class="{{ 'active' if active_page == 'settings' else '' }}" href="/settings">Settings</a>
    </div>
    <div class="nav-status"><span class="pulse"></span> Model: Active</div>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span class="font-headline" style="font-weight: 800; color: var(--ink-strong);">PhishGuard</span>
    <span>Local ML phishing analysis workspace</span>
  </footer>
</body>
</html>
